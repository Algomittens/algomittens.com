<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We're sorry to see you go — Algomittens</title>
  <meta name="description" content="Help us improve by sharing why you uninstalled.">
  <link rel="icon" type="image/png" href="topo-logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ──────────────────────────────────────────── */
    header {
      text-align: center;
      padding: 60px 20px 0;
    }

    .am-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 16px;
      text-decoration: none;
      color: inherit;
    }

    .am-topo {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
    }
    .am-topo .c { position: absolute; }
    .am-topo .c:nth-child(1) {
      width: 12%; height: 12%; border-radius: 50%;
      background: #c4a355;
      animation: amPulse 3s ease-in-out infinite;
    }
    .am-topo .c:nth-child(2) {
      width: 32%; height: 28%;
      border: 0.7px solid rgba(196,163,85,0.5);
      border-radius: 45% 55% 50% 50% / 52% 48% 52% 48%;
      animation: amSpin1 12s linear infinite;
    }
    .am-topo .c:nth-child(3) {
      width: 52%; height: 46%;
      border: 0.7px solid rgba(196,163,85,0.35);
      border-radius: 48% 52% 44% 56% / 54% 42% 58% 46%;
      animation: amSpin2 9s linear infinite;
    }
    .am-topo .c:nth-child(4) {
      width: 72%; height: 66%;
      border: 0.7px solid rgba(196,163,85,0.2);
      border-radius: 40% 60% 52% 48% / 46% 54% 44% 56%;
      animation: amSpin3 7s linear infinite;
    }

    @keyframes amPulse { 0%,100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 1; } }
    @keyframes amSpin1 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes amSpin2 { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
    @keyframes amSpin3 { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .am-wordmark {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 24px;
      line-height: 1;
    }
    .am-wordmark .algo { font-weight: 700; color: rgba(196,163,85,0.8); }
    .am-wordmark .mittens { font-weight: 400; color: rgba(232,228,240,0.55); }

    /* ── Survey card ─────────────────────────────────────── */
    .survey-wrap {
      max-width: 520px;
      width: 100%;
      margin: 40px auto 0;
      padding: 0 20px 80px;
    }

    .survey-card {
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      padding: 32px;
    }

    .ext-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      margin-bottom: 16px;
    }

    .survey-card h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .survey-card .subtitle {
      color: #888;
      font-size: 0.88rem;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* ── Radio options ────────────────────────────────────── */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .option {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .option:hover { border-color: #333; }
    .option.selected { border-color: var(--accent, #c4a355); }

    .option input[type="radio"] { display: none; }

    .radio-dot {
      width: 18px;
      height: 18px;
      border: 2px solid #333;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
    }
    .radio-dot::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent, #c4a355);
      transform: scale(0);
      transition: transform 0.15s;
    }
    .option.selected .radio-dot { border-color: var(--accent, #c4a355); }
    .option.selected .radio-dot::after { transform: scale(1); }

    .option-label {
      font-size: 0.9rem;
      color: #ccc;
      line-height: 1.3;
    }

    /* ── Text area ────────────────────────────────────────── */
    .details-wrap {
      margin-top: 20px;
    }
    .details-wrap label {
      display: block;
      font-size: 0.82rem;
      color: #888;
      margin-bottom: 8px;
    }
    .details-wrap textarea {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 10px;
      color: #e5e5e5;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      padding: 12px 16px;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
    }
    .details-wrap textarea:focus { border-color: #333; }
    .details-wrap textarea::placeholder { color: #444; }

    /* ── Submit button ────────────────────────────────────── */
    .submit-btn {
      margin-top: 24px;
      width: 100%;
      padding: 12px;
      background: var(--accent, #c4a355);
      color: #0a0a0a;
      border: none;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Thank you state ──────────────────────────────────── */
    .thank-you {
      text-align: center;
      padding: 40px 0;
    }
    .thank-you h2 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .thank-you p {
      color: #888;
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .hidden { display: none; }

    /* ── Footer ───────────────────────────────────────────── */
    footer {
      margin-top: auto;
      text-align: center;
      padding: 30px 20px;
      border-top: 1px solid #151515;
      font-size: 0.8rem;
      color: #555;
    }
    footer a {
      color: #777;
      text-decoration: none;
      margin: 0 12px;
    }
    footer a:hover { color: #aaa; }

    @media (max-width: 640px) {
      header { padding-top: 40px; }
      .survey-card { padding: 24px 20px; }
    }
  </style>
</head>
<body>

  <header>
    <a class="am-logo" href="/">
      <div class="am-topo">
        <div class="c"></div>
        <div class="c"></div>
        <div class="c"></div>
        <div class="c"></div>
      </div>
      <div class="am-wordmark">
        <span class="algo">algo</span><span class="mittens">mittens</span>
      </div>
    </a>
  </header>

  <div class="survey-wrap">
    <div class="survey-card" id="surveyCard">

      <div id="formView">
        <img class="ext-icon" id="extIcon" src="" alt="" style="display:none">
        <h1 id="heading">We're sorry to see you go</h1>
        <p class="subtitle">Your feedback helps us build better tools. What made you uninstall?</p>

        <div class="options" id="options">
          <label class="option" data-value="not_useful">
            <input type="radio" name="reason" value="not_useful">
            <span class="radio-dot"></span>
            <span class="option-label">It wasn't useful for me</span>
          </label>
          <label class="option" data-value="too_expensive">
            <input type="radio" name="reason" value="too_expensive">
            <span class="radio-dot"></span>
            <span class="option-label">Too expensive</span>
          </label>
          <label class="option" data-value="found_alternative">
            <input type="radio" name="reason" value="found_alternative">
            <span class="radio-dot"></span>
            <span class="option-label">Found a better alternative</span>
          </label>
          <label class="option" data-value="too_confusing">
            <input type="radio" name="reason" value="too_confusing">
            <span class="radio-dot"></span>
            <span class="option-label">Too confusing or hard to use</span>
          </label>
          <label class="option" data-value="bugs">
            <input type="radio" name="reason" value="bugs">
            <span class="radio-dot"></span>
            <span class="option-label">Bugs or performance issues</span>
          </label>
          <label class="option" data-value="privacy">
            <input type="radio" name="reason" value="privacy">
            <span class="radio-dot"></span>
            <span class="option-label">Privacy or permission concerns</span>
          </label>
          <label class="option" data-value="temporary">
            <input type="radio" name="reason" value="temporary">
            <span class="radio-dot"></span>
            <span class="option-label">Just cleaning up — might reinstall later</span>
          </label>
          <label class="option" data-value="other">
            <input type="radio" name="reason" value="other">
            <span class="radio-dot"></span>
            <span class="option-label">Other</span>
          </label>
        </div>

        <div class="details-wrap">
          <label for="details">Anything else you'd like to share? (optional)</label>
          <textarea id="details" placeholder="What could we have done better?"></textarea>
        </div>

        <button class="submit-btn" id="submitBtn" disabled>Send feedback</button>
      </div>

      <div id="thankYou" class="thank-you hidden">
        <h2>Thank you for your feedback</h2>
        <p>We really appreciate you taking the time. If you ever want to give us another try, we'll be here.</p>
      </div>

    </div>
  </div>

  <footer>
    <div>&copy; 2026 Algomittens LLC</div>
    <div style="margin-top: 8px;">
      <a href="/terms">Terms of Service</a>
      <a href="/privacy">Privacy Policy</a>
      <a href="mailto:support@algomittens.com">Contact</a>
    </div>
  </footer>

  <script>
    // ── Config per extension ──────────────────────────────
    const EXTENSIONS = {
      webtracer:       { name: 'Webtracer',       icon: 'webtracer-icon.svg',       accent: '#6366f1' },
      passexams:       { name: 'PassExams',        icon: 'passexams-icon.png',       accent: '#c4a355' },
      horizantaltabs:  { name: 'HorizantalTabs',   icon: 'horizantaltabs-icon.png',  accent: '#3BBFA0' },
      reviewpanel:     { name: 'ReviewPanel',       icon: 'reviewpanel-icon.svg',     accent: '#e8593c' },
    };

    const SUPABASE_URL = 'https://kfnvfjkgsslybqlydpoz.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmbnZmamtnc3NseWJxbHlkcG96Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjI0OTMsImV4cCI6MjA5MTU5ODQ5M30.zThz378Gnm7_-1dbL60lTsrzT0Gn6kZupz2RfWyrPMQ';

    // ── Parse query params ────────────────────────────────
    const params = new URLSearchParams(window.location.search);
    const extKey = (params.get('ext') || '').toLowerCase();
    const extVersion = params.get('v') || '';
    const ext = EXTENSIONS[extKey];

    // ── Personalize page ──────────────────────────────────
    if (ext) {
      document.getElementById('extIcon').src = ext.icon;
      document.getElementById('extIcon').alt = ext.name;
      document.getElementById('extIcon').style.display = 'block';
      document.getElementById('heading').textContent = `Sorry to see you uninstall ${ext.name}`;
      document.documentElement.style.setProperty('--accent', ext.accent);
    }

    // ── Radio selection ───────────────────────────────────
    let selectedReason = null;
    const optionEls = document.querySelectorAll('.option');
    const submitBtn = document.getElementById('submitBtn');

    optionEls.forEach(el => {
      el.addEventListener('click', () => {
        optionEls.forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        el.querySelector('input').checked = true;
        selectedReason = el.dataset.value;
        submitBtn.disabled = false;
      });
    });

    // ── Submit ────────────────────────────────────────────
    submitBtn.addEventListener('click', async () => {
      if (!selectedReason) return;

      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      const payload = {
        extension: extKey || 'unknown',
        version: extVersion,
        reason: selectedReason,
        details: document.getElementById('details').value.trim() || null,
      };

      try {
        await fetch(`${SUPABASE_URL}/rest/v1/uninstall_responses`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify(payload),
        });
      } catch {
        // Best-effort — show thank you regardless
      }

      document.getElementById('formView').classList.add('hidden');
      document.getElementById('thankYou').classList.remove('hidden');
    });
  </script>

</body>
</html>
