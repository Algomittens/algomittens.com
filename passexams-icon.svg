<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    @keyframes spin1 { from { transform: rotate(-45deg); } to { transform: rotate(315deg); } }
    @keyframes spin2 { from { transform: rotate(-10deg); } to { transform: rotate(350deg); } }
    @keyframes spin3 { from { transform: rotate(25deg); } to { transform: rotate(385deg); } }
    @keyframes spin4 { from { transform: rotate(60deg); } to { transform: rotate(420deg); } }
    @keyframes glow {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    .arc1 { transform-origin: 32px 32px; animation: spin1 14s linear infinite, glow 4s ease-in-out infinite; }
    .arc2 { transform-origin: 32px 32px; animation: spin2 10s linear infinite, glow 4s ease-in-out 0.6s infinite; }
    .arc3 { transform-origin: 32px 32px; animation: spin3 7s linear infinite, glow 4s ease-in-out 1.2s infinite; }
    .arc4 { transform-origin: 32px 32px; animation: spin4 4.5s linear infinite, glow 4s ease-in-out 1.8s infinite; }
  </style>

  <!-- Dark background -->
  <rect width="64" height="64" rx="14" fill="#0b0f14"/>

  <!-- Spinning arcs — pushed to edges -->
  <circle class="arc1" cx="32" cy="32" r="31" fill="none" stroke="rgba(196,163,85,0.12)" stroke-width="1.2"
          stroke-dasharray="97 97"/>
  <circle class="arc2" cx="32" cy="32" r="29" fill="none" stroke="rgba(196,163,85,0.20)" stroke-width="1.2"
          stroke-dasharray="91 91"/>
  <circle class="arc3" cx="32" cy="32" r="27" fill="none" stroke="rgba(196,163,85,0.35)" stroke-width="1.0"
          stroke-dasharray="85 85"/>
  <circle class="arc4" cx="32" cy="32" r="25" fill="none" stroke="rgba(196,163,85,0.55)" stroke-width="1.0"
          stroke-dasharray="79 79"/>

  <!-- P — fills the frame -->
  <text x="8" y="52" font-family="'Outfit','Inter','Segoe UI',sans-serif" font-weight="700" font-size="50" fill="#c4a355" letter-spacing="-2">P</text>
  <!-- x -->
  <text x="38" y="52" font-family="'Outfit','Inter','Segoe UI',sans-serif" font-weight="400" font-size="38" fill="rgba(196,163,85,0.55)">x</text>
</svg>
